{% extends "base.html" %}

{% block title %}
{% if editing %}
ویرایش خودرو
{% else %}
افزودن خودرو
{% endif %}
{% endblock %}

{% block content %}

<h1>
{% if editing %}
✏️ ویرایش خودرو
{% else %}
➕ افزودن خودرو
{% endif %}
</h1>

<div class="card">

<form method="post"
action="{% if editing %}/cars/{{ car.id }}{% else %}/cars/{% endif %}">

<label>شناسه کاربر</label>

<input
type="number"
name="user_id"
value="{{ car.user_id if car else '' }}"
required>

<label>شناسه برند</label>

<input
type="number"
name="brand_id"
value="{{ car.brand_id if car else '' }}"
required>

<label>مدل</label>

<input
type="text"
name="model"
value="{{ car.model if car else '' }}"
required>

<label>سال تولید</label>

<input
type="number"
name="year"
value="{{ car.year if car else '' }}"
required>

<label>قیمت</label>

<input
type="number"
name="price"
value="{{ car.price if car else '' }}"
required>

<label>کارکرد</label>

<input
type="number"
name="mileage"
value="{{ car.mileage if car else '' }}"
required>

<label>رنگ</label>

<input
type="text"
name="color"
value="{{ car.color if car else '' }}">

<label>نوع سوخت</label>

<input
type="text"
name="fuel_type"
value="{{ car.fuel_type if car else '' }}">

<label>گیربکس</label>

<input
type="text"
name="transmission"
value="{{ car.transmission if car else '' }}">

<label>توضیحات</label>

<textarea
name="description"
rows="4">{{ car.description if car else '' }}</textarea>

<br><br>

<button class="btn btn-success">

{% if editing %}
💾 ذخیره تغییرات
{% else %}
➕ ثبت خودرو
{% endif %}

</button>

<a href="/cars/landing" class="btn btn-secondary">
بازگشت
</a>

</form>

</div>

{% endblock %}
